[pytest]
# Run tests from the repo root.  The tests/ directory contains all test files.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks for readability; -p no:warnings silences 3rd-party noise
addopts = -p no:warnings --tb=short

# Ensure sports_engine/ is on the path for imports (mirrors conftest.py)
pythonpath = sports_engine
